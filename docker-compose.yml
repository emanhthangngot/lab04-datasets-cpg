services:
  broker:
    image: confluentinc/cp-kafka:7.6.0
    hostname: broker
    container_name: lab04-broker
    ports:
      - "29092:29092"
    environment:
      # TODO: Keep parser in Compose by default. PLAINTEXT_HOST is retained only
      # for optional host debugging with KAFKA_BOOTSTRAP_EXTERNAL.
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:29093
      KAFKA_LISTENERS: PLAINTEXT://broker:9092,PLAINTEXT_HOST://0.0.0.0:29092,CONTROLLER://broker:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server broker:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12

  connect:
    build: ./kafka-connect
    container_name: lab04-connect
    depends_on:
      broker:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: broker:9092
      CONNECT_REST_ADVERTISED_HOST_NAME: connect
      CONNECT_GROUP_ID: lab04-connect
      CONNECT_CONFIG_STORAGE_TOPIC: _connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: _connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: _connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components,/plugins
    volumes:
      - ./kafka-connect/plugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8083/connectors >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 18

  neo4j:
    image: neo4j:5.20-community
    container_name: lab04-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
      # TODO: Tune heap if full huggingface/datasets ingestion is too large.
      NEO4J_server_memory_heap_initial__size: 1G
      NEO4J_server_memory_heap_max__size: 2G
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p password 'RETURN 1' >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 18

  mongo:
    image: mongo:7.0
    container_name: lab04-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok' >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  spark-checkpoint-init:
    image: docker.io/bitnamilegacy/spark:3.5.0
    user: "0:0"
    entrypoint: ["/bin/sh", "-c"]
    command: ["chown -R 1001:0 /mnt/checkpoints && chmod -R g+rwX /mnt/checkpoints"]
    volumes:
      - spark-checkpoints:/mnt/checkpoints
    restart: "no"

  spark:
    image: docker.io/bitnamilegacy/spark:3.5.0
    container_name: lab04-spark
    depends_on:
      broker:
        condition: service_healthy
      mongo:
        condition: service_healthy
      spark-checkpoint-init:
        condition: service_completed_successfully
    volumes:
      - ./:/app
      - spark-checkpoints:/mnt/checkpoints
    working_dir: /app
    environment:
      SPARK_MODE: master

  parser:
    build:
      context: .
      dockerfile: parser_service/Dockerfile
    container_name: lab04-parser
    depends_on:
      broker:
        condition: service_healthy
    volumes:
      - ./:/app
    working_dir: /app
    environment:
      KAFKA_BOOTSTRAP_SERVERS: broker:9092
      REPO_NAME: huggingface/datasets
      SCHEMA_VERSION: "1.0"

volumes:
  neo4j-data:
  mongo-data:
  spark-checkpoints:
