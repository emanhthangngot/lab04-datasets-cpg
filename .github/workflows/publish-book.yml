name: Build and Publish Jupyter Book

on:
  push:
    branches: [main]
    paths:
      - "book/**"
      - "screenshots/**"
      - "requirements.txt"
      - ".github/workflows/publish-book.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install locked dependencies
        run: python -m pip install -r requirements.txt

      - name: Run repository tests
        run: python -m pytest

      - name: Validate committed evidence
        run: |
          python scripts/stage2_evidence_manifest.py validate --root .
          python scripts/stage3_replay_manifest.py validate --root .

      - name: Build book
        run: jupyter-book build book/

      - name: Verify generated HTML
        run: test -f book/_build/html/index.html

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: book/_build/html
